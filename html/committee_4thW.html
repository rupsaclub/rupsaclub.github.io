    <title>Committee</title>
    <style>
        .committee-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .committee-member {
            width: 500px;
            /* Larger size */
            text-align: center;
        }

        .committee-member img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            /* Slight curve on the corners */
        }

        .committee-member h3 {
            margin: 10px 0 5px;
            font-size: 1.2em;
        }

        .committee-member p {
            margin: 0;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .committee-member {
                width: 100%;
                /* Full width on mobile */
            }
        }
    </style>
</head>
