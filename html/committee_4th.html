<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Committee</title>
    <style>
        .committee-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .committee-member {
            width: 500px;
            /* Larger size */
            text-align: center;
        }

        .committee-member img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            /* Slight curve on the corners */
        }

        .committee-member h3 {
            margin: 10px 0 5px;
            font-size: 1.2em;
        }

        .committee-member p {
            margin: 0;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .committee-member {
                width: 100%;
                /* Full width on mobile */
            }
        }
    </style>
</head>

<body>
    <div class="committee-container">
        <div class="committee-member">
            <img src="contents/images/committee/4th/1.jpg" alt="Member 1">
        </div>
        <div class="committee-member">
            <img src="contents/images/committee/4th/2.jpg" alt="Member 2">
        </div>
        <div class="committee-member">
            <img src="contents/images/committee/4th/3.jpg" alt="Member 3">
        </div>
        <div class="committee-member">
            <img src="contents/images/committee/4th/4.jpg" alt="Member 4">
        </div>
        <div class="committee-member">
            <img src="contents/images/committee/4th/5.jpg" alt="Member 5">
        </div>
        <div class="committee-member">
            <img src="contents/images/committee/4th/6.jpg" alt="Member 6">
        </div>
    </div>
</body>

</html>
